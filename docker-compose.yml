version: "3.9"

services:
  backend:
    container_name: fintrack_backend

    build:
      context: ./backend
      dockerfile: Dockerfile

    working_dir: /app
    env_file:
      - ./backend/.env
    command: npm run dev

    ports:
      - "${BACKEND_PORT}:3000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    environment:
      NODE_ENV: development
      PORT: 3000

      # Banco
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

      # Redis (se usar futuramente)
      REDIS_URL: redis://redis:6379

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    networks:
      - fintrack_network

  frontend:
    container_name: fintrack_frontend

    build:
      context: ./frontend
      dockerfile: Dockerfile

    working_dir: /app
    
    command: npm run dev -- --host

    ports:
      - "${FRONTEND_PORT}:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      VITE_API_URL: http://backend:3000

    depends_on:
      - backend

    networks:
      - fintrack_network

  postgres:
    container_name: fintrack_postgres

    image: postgres:15

    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - fintrack_network

  redis:
    container_name: fintrack_redis

    image: redis:7

    ports:
      - "6379:6379"

    networks:
      - fintrack_network

networks:
  fintrack_network:
    driver: bridge

volumes:
  postgres_data: