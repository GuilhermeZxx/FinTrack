services:
  backend:
    container_name: fintrack_backend

    build:
      context: ./backend
      dockerfile: Dockerfile

    working_dir: /app
    env_file:
      - .env
    command: npm run dev

    ports:
      - "${BACKEND_PORT}:3000"


    environment:
      NODE_ENV: development
      PORT: 3000

      
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}


    depends_on:
      postgres:
        condition: service_healthy
      
    networks:
      - fintrack_network

  frontend:
    container_name: fintrack_frontend

    build:
      context: ./frontend
      dockerfile: Dockerfile

    working_dir: /app
    
    command: npm run dev -- --host

    ports:
      - "${FRONTEND_PORT}:5173"


    environment:
      VITE_API_URL: http://backend:3000

    depends_on:
      - backend

    networks:
      - fintrack_network

  postgres:
    container_name: fintrack_postgres

    image: postgres:18

    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"


    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - fintrack_network

networks:
  fintrack_network:
    driver: bridge

